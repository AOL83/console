<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Command OS</title>

<style>
:root {
  --bg:#050612;
  --panel:rgba(9,18,38,.75);
  --line:rgba(88,246,255,.2);
  --cyan:#58f6ff;
  --pink:#ff4fd8;
  --amber:#ffd166;
  --text:#edf7ff;
}

/* BASE */
body{
  margin:0;
  font-family:system-ui;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, rgba(88,246,255,.25), transparent),
    radial-gradient(circle at 80% 10%, rgba(255,79,216,.25), transparent),
    var(--bg);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:1rem;
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);
}

.brand{font-weight:900;}

.menu-btn{
  cursor:pointer;
  border:1px solid var(--line);
  padding:.5rem .8rem;
  border-radius:10px;
}

/* DRAWER */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
}
.overlay.active{ display:block; }

.drawer{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:#020617;
  border-left:1px solid var(--line);
  transform:translateX(100%);
  transition:.3s;
  display:flex;
  flex-direction:column;
}
.drawer.active{ transform:translateX(0); }

.drawer input{
  margin:.5rem;
  padding:.5rem;
  border-radius:8px;
  border:1px solid var(--line);
  background:#000;
  color:var(--cyan);
}

.nav{
  overflow-y:auto;
  flex:1;
}

.nav a{
  display:block;
  padding:.7rem;
  border-bottom:1px solid #111;
  cursor:pointer;
  border-radius:8px;
}
.nav a:hover{
  background:rgba(88,246,255,.1);
}

/* HERO */
.hero{
  padding:2rem;
}

h1{
  font-size:3rem;
  background:linear-gradient(90deg,#fff,var(--cyan),var(--pink),var(--amber));
  -webkit-background-clip:text;
  color:transparent;
}

/* GRID */
.grid{
  display:grid;
  gap:1rem;
  padding:1rem;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
}

.card{
  padding:1rem;
  border:1px solid var(--line);
  background:var(--panel);
  border-radius:16px;
  cursor:pointer;
  transition:.2s;
}
.card:hover{
  transform:translateY(-3px);
  border-color:var(--cyan);
}

/* CONSOLE */
.console{
  position:fixed;
  bottom:0;
  width:100%;
  height:200px;
  background:#000;
  border-top:1px solid var(--cyan);
  display:flex;
  flex-direction:column;
}

.log{
  flex:1;
  overflow:auto;
  font-family:monospace;
  padding:.5rem;
}

input.cmd{
  background:#000;
  border:none;
  border-top:1px solid var(--cyan);
  color:var(--cyan);
  padding:.5rem;
}
</style>
</head>

<body>

<div class="header">
  <div class="brand">⚡ Aurora Command</div>
  <div class="menu-btn" id="menuBtn">☰</div>
</div>

<div class="overlay" id="overlay"></div>

<div class="drawer" id="drawer">
  <input id="search" placeholder="Search..." />
  <div class="nav" id="nav">
    <a onclick="runCmd('page home')">Home</a>
    <a onclick="runCmd('page dev')">Dev</a>
    <a onclick="runCmd('page unreal')">VM</a>
    <a onclick="runCmd('load cart game')">Load Game</a>
    <a onclick="runCmd('run cart')">Run Game</a>
  </div>
</div>

<div class="hero">
  <h1>Aurora OS</h1>
</div>

<div class="grid">
  <div class="card" onclick="runCmd('page dev')">Dev Tools</div>
  <div class="card" onclick="runCmd('page unreal')">VM</div>
  <div class="card" onclick="runCmd('load cart game')">Load Cart</div>
  <div class="card" onclick="runCmd('run cart')">Run Cart</div>
</div>

<div class="console">
  <div id="log" class="log"></div>
  <input id="cmd" class="cmd" placeholder="Command..." />
</div>

<script>
const drawer = document.getElementById("drawer");
const overlay = document.getElementById("overlay");
const menuBtn = document.getElementById("menuBtn");

/* MENU */
menuBtn.onclick = () => toggleMenu();
overlay.onclick = () => closeMenu();

function toggleMenu(){
  drawer.classList.toggle("active");
  overlay.classList.toggle("active");
}

function closeMenu(){
  drawer.classList.remove("active");
  overlay.classList.remove("active");
}

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeMenu();
});

/* SEARCH */
document.getElementById("search").oninput = e=>{
  const q = e.target.value.toLowerCase();
  document.querySelectorAll(".nav a").forEach(a=>{
    a.style.display = a.textContent.toLowerCase().includes(q) ? "block":"none";
  });
};

/* LOG */
const logEl = document.getElementById("log");
function log(msg){
  const d=document.createElement("div");
  d.textContent="> "+msg;
  logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
}

/* CORE */
const Aurora={
  state:{page:"home",cart:null},
  run(input){
    const p=input.split(" ");
    const cmd=p.slice(0,2).join(" ");
    const arg=p.slice(2).join(" ");

    let res="Unknown";

    if(cmd==="page"){
      this.state.page=arg;
      res="Switched to "+arg;
    }
    else if(cmd==="load cart"){
      this.state.cart=arg;
      res="Loaded "+arg;
    }
    else if(cmd==="run cart"){
      res=this.state.cart ? "Running "+this.state.cart : "No cart";
    }

    log(res);
  }
};

function runCmd(c){
  Aurora.run(c);
  closeMenu();
}

/* INPUT */
document.getElementById("cmd").addEventListener("keypress", e=>{
  if(e.key==="Enter"){
    const v=e.target.value;
    log(v);
    Aurora.run(v);
    e.target.value="";
  }
});

log("Aurora Ready");
</script>

</body>
</html>
