<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Command OS</title>

<style>
:root{
  --bg:#050612;
  --panel:rgba(9,18,38,.7);
  --line:rgba(140,245,255,.18);
  --cyan:#58f6ff;
  --pink:#ff4fd8;
  --amber:#ffd166;
  --yellow:#eaff38;
  --green:#55ff9f;
  --text:#edf7ff;
  --radius:20px;
}

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Inter,system-ui;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 10%, rgba(88,246,255,.2), transparent 40rem),
    radial-gradient(circle at 80% 0%, rgba(255,79,216,.2), transparent 40rem),
    linear-gradient(135deg,#03040d,#08111f,#050612);
}

/* GRID OVERLAY */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(88,246,255,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(88,246,255,.06) 1px, transparent 1px);
  background-size:60px 60px;
  opacity:.25;
  pointer-events:none;
}

/* ===== HEADER ===== */
.header{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:1rem 1.5rem;
  backdrop-filter:blur(20px);
  background:rgba(5,10,25,.7);
  border-bottom:1px solid var(--line);
}

.nav a{
  margin-right:1rem;
  padding:.5rem .9rem;
  border-radius:999px;
  transition:.2s;
  cursor:pointer;
}

.nav a:hover{
  border:1px solid var(--cyan);
  background:rgba(88,246,255,.1);
  box-shadow:0 0 20px rgba(88,246,255,.2);
}

/* ===== HERO ===== */
.hero{
  max-width:1100px;
  margin:auto;
  padding:4rem 1.5rem;
}

h1{
  font-size:clamp(3rem,8vw,6rem);
  margin:0;
  background:linear-gradient(90deg,#fff,var(--cyan),var(--pink),var(--amber));
  -webkit-background-clip:text;
  color:transparent;
}

/* ===== GRID ===== */
.grid{
  max-width:1100px;
  margin:auto;
  display:grid;
  gap:1rem;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  padding:1rem;
}

/* ===== CARD ===== */
.card{
  padding:1.2rem;
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.08);
  background:var(--panel);
  transition:.25s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-6px);
  border-color:var(--cyan);
  box-shadow:0 0 30px rgba(88,246,255,.2);
}

/* ===== FOOTER ===== */
.footer{
  position:relative;
  margin-top:3rem;
  border-top:1px solid rgba(234,255,56,.3);
  background:
    radial-gradient(circle at 10% 10%, rgba(234,255,56,.2), transparent 20rem),
    radial-gradient(circle at 90% 0%, rgba(85,255,159,.2), transparent 22rem),
    linear-gradient(180deg, rgba(4,8,16,.5), rgba(2,7,5,.95));
  box-shadow: inset 0 1px 0 rgba(234,255,56,.15);
}

.footer::before{
  content:"";
  position:absolute;
  inset:0;
  opacity:.25;
  background:
    linear-gradient(120deg, transparent 40%, rgba(234,255,56,.15), transparent 60%),
    repeating-linear-gradient(90deg, rgba(85,255,159,.08) 0 1px, transparent 1px 18px);
}

.footer-inner{
  width:min(100% - 1.5rem,1100px);
  margin:auto;
  padding:2.5rem 0;
}

.footer-top{
  display:grid;
  gap:1.5rem;
}

.footer-brand h2{
  margin:0;
  font-size:clamp(2rem,6vw,3rem);
  background:linear-gradient(90deg,#fff,var(--yellow),var(--green));
  -webkit-background-clip:text;
  color:transparent;
}

.footer-brand p{
  color:#a8b89a;
}

.social-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:.8rem;
  margin-top:1rem;
}

.social-link{
  display:flex;
  justify-content:space-between;
  padding:.8rem 1rem;
  border-radius:18px;
  border:1px solid rgba(223,255,87,.4);
  background:
    linear-gradient(135deg, rgba(223,255,87,.15), rgba(85,255,159,.08), rgba(0,0,0,.4));
  color:#eaffaa;
  font-weight:800;
  transition:.25s;
}

.social-link:hover{
  transform:translateY(-6px);
  box-shadow:0 0 40px rgba(85,255,159,.2);
}

.footer-bottom{
  display:flex;
  justify-content:space-between;
  margin-top:2rem;
  padding-top:1rem;
  border-top:1px solid rgba(234,255,56,.15);
  font-size:.85rem;
  color:#9cae90;
}

/* ===== CONSOLE ===== */
.console{
  position:fixed;
  bottom:0;
  width:100%;
  max-height:300px;
  display:flex;
  flex-direction:column;
  background:#000;
  border-top:1px solid var(--cyan);
}

.log{
  flex:1;
  overflow-y:auto;
  font-family:monospace;
  padding:.5rem;
}

input{
  border:none;
  border-top:1px solid var(--cyan);
  background:#000;
  color:var(--cyan);
  padding:.5rem;
}
</style>
</head>

<body>

<div class="header">
  <div>⚡ Aurora Command</div>
  <div class="nav">
    <a onclick="Aurora.run('page home')">Home</a>
    <a onclick="Aurora.run('page dev')">Dev</a>
    <a onclick="Aurora.run('page unreal')">VM</a>
    <a onclick="Aurora.run('run cart game')">Game</a>
  </div>
</div>

<div class="hero">
  <h1>Aurora OS</h1>
  <p>Command-driven interface with unified visual system.</p>
</div>

<div class="grid">
  <div class="card" onclick="Aurora.run('page dev')">Dev Environment</div>
  <div class="card" onclick="Aurora.run('page unreal')">VM System</div>
  <div class="card" onclick="Aurora.run('load cart game')">Load Game</div>
  <div class="card" onclick="Aurora.run('run cart game')">Run Game</div>
</div>

<!-- ===== FULL FOOTER INTEGRATED ===== -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-top">
      <div class="footer-brand">
        <h2>System Signal</h2>
        <p>External links, builds, and outputs from Aurora.</p>
      </div>

      <div class="social-grid">
        <a class="social-link" href="#"><span>GitHub</span><span>↗</span></a>
        <a class="social-link" href="#"><span>YouTube</span><span>↗</span></a>
        <a class="social-link" href="#"><span>Docs</span><span>↗</span></a>
        <a class="social-link" href="#"><span>Logs</span><span>↗</span></a>
      </div>
    </div>

    <div class="footer-bottom">
      <span>© <span id="year"></span> Aurora OS</span>
      <span>Command layer active</span>
    </div>
  </div>
</footer>

<div class="console">
  <div id="log" class="log"></div>
  <input id="cmd" placeholder="Type command..." />
</div>

<script>
const logEl=document.getElementById("log");

function log(msg){
  const d=document.createElement("div");
  d.textContent="> "+msg;
  logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
}

const Aurora={
  state:{page:"home",cart:null},
  commands:{
    help(){return "help, page, load cart, run cart";},
    page(arg){this.state.page=arg;log("Switched to "+arg);return "OK";},
    "load cart"(arg){this.state.cart=arg;return "Loaded "+arg;},
    "run cart"(){
      if(!this.state.cart)return "No cart";
      log("Running "+this.state.cart);
      return "Executed";
    }
  },
  run(input){
    const p=input.split(" ");
    const cmd=p.slice(0,2).join(" ");
    const arg=p.slice(2).join(" ");
    if(this.commands[cmd])return log(this.commands[cmd].call(this,arg));
    if(this.commands[p[0]])return log(this.commands[p[0]].call(this,arg));
    log("Unknown command");
  }
};

document.getElementById("cmd").addEventListener("keypress",e=>{
  if(e.key==="Enter"){
    const v=e.target.value;
    log(v);
    Aurora.run(v);
    e.target.value="";
  }
});

/* YEAR */
document.getElementById("year").textContent = new Date().getFullYear();

log("Aurora OS Ready");
</script>

</body>
</html>
