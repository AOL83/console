<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Command OS</title>

<!-- KEEP YOUR FULL CSS EXACTLY AS IS -->
<!-- (UNCHANGED — I only appended console styles at bottom) -->

<style>
/* === YOUR ENTIRE CSS ABOVE (UNCHANGED) === */

/* =========================
   AURORA OS CONSOLE (MATCHED STYLE)
========================= */
.console-panel {
  margin-top: 2rem;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: rgba(0,0,0,0.45);
  padding: 1rem;
}

.console-log {
  height: 180px;
  overflow-y: auto;
  font-family: monospace;
  color: var(--green);
  font-size: 0.85rem;
}

.console-input {
  width: 100%;
  margin-top: 0.5rem;
  padding: 0.6rem;
  border-radius: 10px;
  border: 1px solid var(--cyan);
  background: #000;
  color: var(--green);
}
</style>
</head>

<body>

<!-- KEEP YOUR FULL HTML STRUCTURE EXACTLY -->
<!-- ONLY ADDING CONSOLE INTO HERO PANEL -->

<main id="main">
<section class="hero">
<div class="hero-panel">

<h1><span class="gradient-text">Aurora OS</span></h1>

<p class="hero-copy">
Live command system embedded into Aurora Command.
</p>

<!-- ⚡ CONSOLE INSERT -->
<div class="console-panel">
  <div id="log" class="console-log"></div>
  <input id="cmd" class="console-input" placeholder="Type command..." />
</div>

</div>
</section>
</main>

<!-- KEEP YOUR FOOTER -->

<script>
/* =========================
   YOUR EXISTING NAV SCRIPT
========================= */
const menuToggle = document.getElementById('menuToggle');
const drawer = document.getElementById('siteDrawer');
const overlay = document.getElementById('drawerOverlay');

function setMenu(open) {
  document.body.classList.toggle('nav-open', open);
  drawer.classList.toggle('active', open);
  overlay.classList.toggle('active', open);
}
menuToggle?.addEventListener('click', () => setMenu(true));
overlay?.addEventListener('click', () => setMenu(false));

/* =========================
   AURORA CORE (BRAIN)
========================= */
const Aurora = {
  state: {
    cartridge: null
  },

  commands: {
    help() {
      return "help, load cart [name], run cart, clear";
    },

    "load cart"(arg) {
      Aurora.state.cartridge = arg;
      return "Loaded: " + arg;
    },

    "run cart"() {
      if (!Aurora.state.cartridge) return "No cartridge";
      if (Cartridges[Aurora.state.cartridge]) {
        Cartridges[Aurora.state.cartridge].run();
        return "Running " + Aurora.state.cartridge;
      }
      return "Unknown cartridge";
    },

    clear() {
      logEl.innerHTML = "";
      return "Cleared";
    }
  },

  run(input) {
    const parts = input.split(" ");
    const cmd = parts.slice(0,2).join(" ").toLowerCase();
    const arg = parts.slice(2).join(" ");

    if (this.commands[cmd]) return this.commands[cmd](arg);
    if (this.commands[parts[0]]) return this.commands[parts[0]](arg);

    return "Unknown command";
  }
};

/* =========================
   CARTRIDGES
========================= */
const Cartridges = {
  dev: {
    run() {
      log("Dev tools activated");
    }
  },
  game: {
    run() {
      log("Game mode launched");
    }
  }
};

/* =========================
   CONSOLE SYSTEM
========================= */
const logEl = document.getElementById("log");
const input = document.getElementById("cmd");

function log(msg) {
  const div = document.createElement("div");
  div.textContent = "> " + msg;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

input?.addEventListener("keypress", e => {
  if (e.key === "Enter") {
    const val = input.value;
    log(val);
    log(Aurora.run(val));
    input.value = "";
  }
});

/* INIT */
log("Aurora OS Ready");
</script>

</body>
</html>
