<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Core OS</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0a0f1c;
  color:#e2e8f0;
}

.navbar {
  display:flex;
  justify-content:space-between;
  padding:1rem;
  background:#020617;
  border-bottom:1px solid #333;
}
.nav-links a {
  margin-right:1rem;
  color:#94a3b8;
  text-decoration:none;
  cursor:pointer;
}
.nav-links a:hover { color:#D4AF37; }

.page { display:none; padding:1rem; }
.active { display:block; }

.console {
  background:#000;
  border:1px solid #4ade80;
  padding:1rem;
  height:200px;
  overflow-y:auto;
  font-family:monospace;
}

input {
  width:100%;
  padding:0.5rem;
  margin-top:0.5rem;
  background:#000;
  color:#4ade80;
  border:1px solid #4ade80;
}
</style>
</head>

<body>

<div class="navbar">
  <div>⚡ Aurora OS</div>
  <div class="nav-links">
    <a onclick="Aurora.run('page home')">Home</a>
    <a onclick="Aurora.run('page console')">Console</a>
    <a onclick="Aurora.run('system dev open')">Dev Tools</a>
    <a onclick="Aurora.run('system unreal open')">Unreal</a>
    <a onclick="Aurora.run('page cartridge')">Cartridge</a>
  </div>
</div>

<div id="home" class="page active">
  <h2>Welcome to Aurora</h2>
  <p>Unified Core-Controlled OS</p>
</div>

<div id="console" class="page">
  <h2>Console</h2>
  <div id="log" class="console"></div>
  <input id="cmd" placeholder="Type command..." />
</div>

<div id="dev" class="page">
  <h2>Dev Tools</h2>
  <iframe src="https://stackblitz.com/edit/web-platform?embed=1"
          style="width:100%;height:400px;border:none;"></iframe>
</div>

<div id="unreal" class="page">
  <h2>Unreal / VM</h2>
  <iframe src="https://copy.sh/v86/?profile=alpine"
          style="width:100%;height:400px;border:none;"></iframe>
</div>

<div id="cartridge" class="page">
  <h2>Cartridge System</h2>
  <p>Load and run modules via core</p>
</div>

<script>

/* =========================
   UI CONTROL
========================= */
function switchPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =========================
   LOG SYSTEM
========================= */
const logEl = document.getElementById("log");

function log(msg) {
  const div = document.createElement("div");
  div.textContent = "> " + msg;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

/* =========================
   AURORA CORE (ORCHESTRATOR)
========================= */
const Aurora = {

  state: {
    systems: {},
    cartridge: null
  },

  /* SYSTEM REGISTRATION */
  register(name, system) {
    this.state.systems[name] = system;
  },

  /* COMMAND ENGINE */
  run(input) {
    const parts = input.trim().split(" ");
    const [type, name, action, ...rest] = parts;
    const arg = rest.join(" ");

    if (type === "page") {
      switchPage(name);
      return this.output("Page → " + name);
    }

    if (type === "system") {
      const sys = this.state.systems[name];
      if (!sys) return this.output("System not found");

      if (!sys[action]) return this.output("Invalid action");

      const result = sys[action](arg);
      return this.output(result || "OK");
    }

    if (type === "cart") {
      if (name === "load") {
        this.state.cartridge = action;
        return this.output("Loaded cart: " + action);
      }

      if (name === "run") {
        const c = this.state.cartridge;
        if (!c) return this.output("No cart loaded");

        const cart = Cartridges[c];
        if (!cart) return this.output("Cart not found");

        cart.run();
        return this.output("Running cart: " + c);
      }
    }

    if (type === "help") {
      return this.output(
        "Commands:\n" +
        "page [name]\n" +
        "system [name] [action]\n" +
        "cart load [name]\n" +
        "cart run"
      );
    }

    return this.output("Unknown command");
  },

  output(msg) {
    log(msg);
    return msg;
  }
};

/* =========================
   SYSTEM DEFINITIONS
========================= */

/* DEV SYSTEM */
Aurora.register("dev", {
  open() {
    switchPage("dev");
    return "Dev environment opened";
  }
});

/* UNREAL SYSTEM */
Aurora.register("unreal", {
  open() {
    switchPage("unreal");
    return "VM launched";
  }
});

/* MINING SYSTEM (example future expansion) */
Aurora.register("mining", {
  start() {
    return "Mining started";
  },
  stop() {
    return "Mining stopped";
  }
});

/* FLIPPER SYSTEM (example) */
Aurora.register("flipper", {
  connect() {
    return "Flipper connected";
  },
  arm() {
    return "Flipper armed";
  }
});

/* =========================
   CARTRIDGES
========================= */
const Cartridges = {

  game: {
    run() {
      Aurora.run("system unreal open");
      log("Game cartridge executed");
    }
  },

  dev: {
    run() {
      Aurora.run("system dev open");
      log("Dev cartridge executed");
    }
  }

};

/* =========================
   INPUT HANDLER
========================= */
const input = document.getElementById("cmd");

input.addEventListener("keypress", e => {
  if (e.key === "Enter") {
    const val = input.value;
    log(val);
    Aurora.run(val);
    input.value = "";
  }
});

/* =========================
   INIT
========================= */
log("Aurora Core Online");

</script>

</body>
</html>
