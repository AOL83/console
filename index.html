<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Command OS</title>

<style>
:root{
  --bg:#050612;
  --panel:rgba(9,18,38,.7);
  --line:rgba(140,245,255,.18);
  --cyan:#58f6ff;
  --pink:#ff4fd8;
  --amber:#ffd166;
  --text:#edf7ff;
}

body{
  margin:0;
  font-family:system-ui;
  background:
    radial-gradient(circle at 20% 20%, rgba(88,246,255,.15), transparent),
    radial-gradient(circle at 80% 10%, rgba(255,79,216,.15), transparent),
    var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:1rem;
  border-bottom:1px solid var(--line);
}

.nav a{
  margin-right:1rem;
  cursor:pointer;
  color:#aaa;
}
.nav a:hover{ color:var(--cyan); }

/* HERO */
.hero{
  padding:3rem 1rem;
  max-width:1000px;
  margin:auto;
}

h1{
  font-size:3rem;
  background:linear-gradient(90deg,#fff,var(--cyan),var(--pink),var(--amber));
  -webkit-background-clip:text;
  color:transparent;
}

/* GRID */
.grid{
  display:grid;
  gap:1rem;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  padding:1rem;
}

.card{
  padding:1rem;
  border:1px solid var(--line);
  background:var(--panel);
  cursor:pointer;
}
.card:hover{ border-color:var(--cyan); }

/* CONSOLE */
.console{
  position:fixed;
  bottom:0;
  width:100%;
  max-height:260px;
  background:#000;
  border-top:1px solid var(--cyan);
  display:flex;
  flex-direction:column;
}

.log{
  flex:1;
  overflow:auto;
  font-family:monospace;
  padding:.5rem;
}

input{
  background:#000;
  border:none;
  border-top:1px solid var(--cyan);
  color:var(--cyan);
  padding:.5rem;
}
</style>
</head>

<body>

<div class="header">
  <div>⚡ Aurora Command</div>
  <div class="nav">
    <a onclick="Aurora.run('page home')">Home</a>
    <a onclick="Aurora.run('page dev')">Dev</a>
    <a onclick="Aurora.run('page unreal')">VM</a>
    <a onclick="Aurora.run('help')">Help</a>
  </div>
</div>

<div class="hero">
  <h1>Aurora Unified OS</h1>
  <p>Command brain + cyber UI fully integrated.</p>
</div>

<div class="grid">
  <div class="card" onclick="Aurora.run('page dev')">Open Dev</div>
  <div class="card" onclick="Aurora.run('page unreal')">Open VM</div>
  <div class="card" onclick="Aurora.run('load cart game')">Load Game</div>
  <div class="card" onclick="Aurora.run('run cart')">Run Game</div>
</div>

<div class="console">
  <div id="log" class="log"></div>
  <input id="cmd" placeholder="Type command..." />
</div>

<script>
const logEl=document.getElementById("log");

function log(msg){
  const d=document.createElement("div");
  d.textContent="> "+msg;
  logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
}

/* CORE */
const Aurora={
  state:{page:"home",cart:null},

  commands:{
    help(){ return "help, page [x], load cart [x], run cart"; },

    page(arg){
      this.state.page=arg;
      return "Switched to "+arg;
    },

    "load cart"(arg){
      this.state.cart=arg;
      return "Loaded "+arg;
    },

    "run cart"(){
      if(!this.state.cart) return "No cart loaded";
      return "Running "+this.state.cart;
    }
  },

  run(input){
    const p=input.split(" ");
    const cmd=p.slice(0,2).join(" ");
    const arg=p.slice(2).join(" ");

    if(this.commands[cmd]) log(this.commands[cmd].call(this,arg));
    else if(this.commands[p[0]]) log(this.commands[p[0]].call(this,arg));
    else log("Unknown command");
  }
};

/* INPUT */
document.getElementById("cmd").addEventListener("keypress",e=>{
  if(e.key==="Enter"){
    const v=e.target.value;
    log(v);
    Aurora.run(v);
    e.target.value="";
  }
});

log("Aurora OS Ready");
</script>

</body>
</html>
