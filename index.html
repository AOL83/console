<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Command OS</title>

<style>
:root{
  --bg:#050612;
  --panel:rgba(9,18,38,.75);
  --line:rgba(140,245,255,.18);
  --cyan:#58f6ff;
  --pink:#ff4fd8;
  --amber:#ffd166;
  --text:#edf7ff;
}

/* BASE */
body{
  margin:0;
  font-family:system-ui;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, rgba(88,246,255,.2), transparent),
    radial-gradient(circle at 80% 10%, rgba(255,79,216,.2), transparent),
    var(--bg);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1rem;
  border-bottom:1px solid var(--line);
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
}

.brand{font-weight:900;}

.menu-btn{
  cursor:pointer;
  padding:.5rem 1rem;
  border:1px solid var(--line);
}

/* DRAWER */
.drawer{
  position:fixed;
  top:0;
  right:-320px;
  width:320px;
  height:100%;
  background:#020617;
  border-left:1px solid var(--line);
  transition:.3s;
  padding:1rem;
  overflow:auto;
}
.drawer.open{ right:0; }

.drawer a{
  display:block;
  padding:.6rem;
  border-bottom:1px solid #111;
  cursor:pointer;
}
.drawer a:hover{ color:var(--cyan); }

/* HERO */
.hero{
  padding:2rem;
}

h1{
  font-size:3rem;
  background:linear-gradient(90deg,#fff,var(--cyan),var(--pink),var(--amber));
  -webkit-background-clip:text;
  color:transparent;
}

/* GRID */
.grid{
  display:grid;
  gap:1rem;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  padding:1rem;
}

.card{
  padding:1rem;
  border:1px solid var(--line);
  background:var(--panel);
  cursor:pointer;
}
.card:hover{ border-color:var(--cyan); }

/* CONSOLE */
.console{
  position:fixed;
  bottom:0;
  width:100%;
  height:220px;
  background:#000;
  border-top:1px solid var(--cyan);
  display:flex;
  flex-direction:column;
}

.log{
  flex:1;
  overflow:auto;
  font-family:monospace;
  padding:.5rem;
}

input{
  background:#000;
  border:none;
  border-top:1px solid var(--cyan);
  color:var(--cyan);
  padding:.5rem;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">⚡ Aurora Command</div>
  <div class="menu-btn" onclick="toggleDrawer()">☰ Menu</div>
</div>

<!-- DRAWER -->
<div id="drawer" class="drawer">
  <a onclick="Aurora.run('page home')">Home</a>
  <a onclick="Aurora.run('page dev')">Dev Tools</a>
  <a onclick="Aurora.run('page unreal')">VM</a>
  <a onclick="Aurora.run('load cart game')">Load Game</a>
  <a onclick="Aurora.run('run cart')">Run Game</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Aurora Unified System</h1>
  <p>Cyberpunk UI + Command Brain</p>
</div>

<!-- GRID -->
<div class="grid">
  <div class="card" onclick="Aurora.run('page dev')">Open Dev</div>
  <div class="card" onclick="Aurora.run('page unreal')">Open VM</div>
  <div class="card" onclick="Aurora.run('load cart game')">Load Cartridge</div>
  <div class="card" onclick="Aurora.run('run cart')">Run Cartridge</div>
</div>

<!-- CONSOLE -->
<div class="console">
  <div id="log" class="log"></div>
  <input id="cmd" placeholder="Type command..." />
</div>

<script>
const logEl=document.getElementById("log");

function log(msg){
  const d=document.createElement("div");
  d.textContent="> "+msg;
  logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
}

function toggleDrawer(){
  document.getElementById("drawer").classList.toggle("open");
}

/* CORE */
const Aurora={
  state:{page:"home",cart:null},

  commands:{
    help(){ return "help, page [x], load cart [x], run cart"; },

    page(arg){
      this.state.page=arg;
      return "Switched to "+arg;
    },

    "load cart"(arg){
      this.state.cart=arg;
      return "Loaded "+arg;
    },

    "run cart"(){
      if(!this.state.cart) return "No cart loaded";
      return "Running "+this.state.cart;
    }
  },

  run(input){
    const p=input.split(" ");
    const cmd=p.slice(0,2).join(" ");
    const arg=p.slice(2).join(" ");

    let result;

    if(this.commands[cmd]) result=this.commands[cmd].call(this,arg);
    else if(this.commands[p[0]]) result=this.commands[p[0]].call(this,arg);
    else result="Unknown command";

    log(result);
  }
};

/* INPUT */
document.getElementById("cmd").addEventListener("keypress",e=>{
  if(e.key==="Enter"){
    const v=e.target.value;
    log(v);
    Aurora.run(v);
    e.target.value="";
  }
});

log("Aurora OS Ready");
</script>

</body>
</html>
