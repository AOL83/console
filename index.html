<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#060817" />
<meta name="description" content="Aurora Logistical Control Nest — real-time command console built on Aurora Command framework." />
<title>Aurora Control Nest</title>

<style>
/* === EXACT STYLE SYSTEM (UNCHANGED) === */
:root {
  --bg: #050612;
  --panel: rgba(9,18,38,0.72);
  --line: rgba(140,245,255,0.18);
  --text: #edf7ff;
  --muted: #99aac5;
  --cyan:#58f6ff;
  --green:#55ff9f;
  --amber:#ffd166;
  --radius-lg:20px;
  --radius-xl:28px;
  --max:1200px;
  --nav-height:72px;
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Inter,system-ui;
  color:var(--text);
  background:linear-gradient(135deg,#03040d,#08111f,#050612);
}

a{color:inherit;text-decoration:none}

/* HEADER (IDENTICAL) */
.site-header{
  position:sticky;
  top:0;
  height:var(--nav-height);
  border-bottom:1px solid var(--line);
  background:rgba(4,7,18,0.8);
  backdrop-filter:blur(20px);
}

.nav-shell{
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:100%;
  width:min(100% - 1.25rem,var(--max));
  margin:auto;
}

.brand{display:flex;gap:.6rem;align-items:center;}
.brand-mark{
  width:44px;height:44px;
  display:grid;place-items:center;
  border-radius:12px;
  background:linear-gradient(135deg,#58f6ff,#ff4fd8);
  color:#000;font-weight:900;
}

/* CONSOLE AREA */
.console-wrap{
  width:min(100% - 1.25rem,var(--max));
  margin:2rem auto;
}

.console-panel{
  border:1px solid var(--line);
  border-radius:var(--radius-xl);
  background:var(--panel);
  padding:1.5rem;
  min-height:500px;
  display:flex;
  flex-direction:column;
}

.console-output{
  flex:1;
  font-family:monospace;
  font-size:.9rem;
  color:var(--green);
  overflow-y:auto;
}

.console-input{
  display:flex;
  margin-top:1rem;
  gap:.5rem;
}

.console-input input{
  flex:1;
  padding:.7rem;
  background:#000;
  border:1px solid var(--line);
  color:var(--green);
}

/* FOOTER (EXACT COPY STRUCTURE) */
.footer{
  margin-top:3rem;
  border-top:1px solid rgba(234,255,56,0.32);
  padding:2rem 0;
}

.footer-inner{
  width:min(100% - 1.25rem,var(--max));
  margin:auto;
}

.footer-bottom{
  margin-top:1rem;
  color:#9cae90;
  font-size:.8rem;
}
</style>
</head>

<body>

<header class="site-header">
  <div class="nav-shell">
    <div class="brand">
      <span class="brand-mark">A</span>
      <div>
        <strong>Aurora Command</strong><br>
        <small>Experimental Web Cockpit</small>
      </div>
    </div>
  </div>
</header>

<main>

<section class="console-wrap">
  <div class="console-panel">

    <h2>Logistical Control Nest</h2>
    <p style="color:var(--muted)">Command console interface — issue directives below.</p>

    <div id="consoleOutput" class="console-output">
      > Aurora Console Ready...<br>
    </div>

    <div class="console-input">
      <input id="consoleInput" placeholder="Enter command..." />
    </div>

  </div>
</section>

</main>

<footer class="footer">
  <div class="footer-inner">

    <div class="footer-bottom">
      <span>© <span id="year"></span> Aurora Command / Terence Lewis</span><br>
      <span>Static multi-page architecture. Neon included. Chaos mildly supervised.</span>
    </div>

  </div>
</footer>

<script>
/* EXACT INLINE JS (NO EXTERNALS) */

document.getElementById('year').textContent = new Date().getFullYear();

const input = document.getElementById("consoleInput");
const output = document.getElementById("consoleOutput");

input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    const cmd = input.value.trim();
    output.innerHTML += "> " + cmd + "<br>";

    if(cmd === "clear"){
      output.innerHTML = "";
    } else {
      output.innerHTML += "Command executed: " + cmd + "<br>";
    }

    input.value = "";
    output.scrollTop = output.scrollHeight;
  }
});
</script>

</body>
</html>
